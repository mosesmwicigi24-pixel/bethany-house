# ─────────────────────────────────────────────────────────────────────────────
# Add this block to your existing docker/nginx/conf.d/default.conf
# alongside the existing Laravel and Next.js location blocks.
#
# This routes /admin-react/* → React admin container
# while /admin/* continues to serve the Livewire admin (zero disruption).
# ─────────────────────────────────────────────────────────────────────────────

# React Admin SPA
location /admin-react {
    # Strip the prefix so the React app sees paths from /
    # e.g.  /admin-react/dashboard  →  upstream receives /dashboard
    rewrite ^/admin-react/?(.*)$ /$1 break;
    proxy_pass         http://bethany_react_admin:80;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # SPA deep-link fallback handled inside the React nginx container,
    # but we still need the outer proxy to not 404 on sub-paths.
    proxy_intercept_errors off;
}

# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: When you are ready to make React the default admin,
# simply change the existing /admin location to proxy to react-admin
# and remove this /admin-react block.
# ─────────────────────────────────────────────────────────────────────────────
