# react-admin/nginx.conf

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Strip /admin prefix and re-dispatch ───────────────────────────────────
    # Nginx location priority: = > ^~ > ~ > prefix
    # The regex location for assets would match /admin/assets/*.js BEFORE the
    # prefix location /admin/ - so we must use ^~ to block regex matching and
    # force the rewrite to happen first.
    #
    # After rewrite with `last`, Nginx re-evaluates the rewritten URI
    # (/assets/index.js) against all locations again - this time the regex
    # location matches correctly and serves the file from disk.

    location = /admin  { rewrite ^ /      last; }
    location = /admin/ { rewrite ^ /      last; }

    # ^~ prevents regex locations from matching /admin/* - rewrite runs first
    location ^~ /admin/ {
        rewrite ^/admin/(.*)$ /$1 last;
    }

    # ── Hashed static assets - cache forever (matched after rewrite) ──────────
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── index.html - never cache ──────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}