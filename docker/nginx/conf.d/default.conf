upstream laravel_backend {
    server laravel:9000;
    keepalive 32;
}

upstream nextjs_frontend {
    server nextjs:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/public;
    index index.php index.html;
    
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    
    client_max_body_size 20M;

    # ================================================
    # STATIC FILES - Serve directly from Laravel
    # ================================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/public;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Laravel routes - use try_files to route to index.php
    location ~ ^/(api|admin|pos|livewire|webhooks|up) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP file handling - this processes the Laravel app
    location ~ \.php$ {
        try_files $uri =404;
        
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass laravel_backend;
        fastcgi_index index.php;
        
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT $document_root;
        
        fastcgi_buffering off;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }
    
    # Storage
    location /storage {
        alias /var/www/storage/app/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # Next.js static assets
    location /_next/static {
        proxy_pass http://nextjs_frontend;
        add_header Cache-Control "public, immutable";
    }
    
    location /_next/image {
        proxy_pass http://nextjs_frontend;
    }
    
    location /_next/webpack-hmr {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Everything else → Next.js
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Admin SPA
    location /admin-react {
        # Strip the prefix so the React app sees paths from /
        # e.g.  /admin-react/dashboard  →  upstream receives /dashboard
        rewrite ^/admin-react/?(.*)$ /$1 break;
        proxy_pass         http://bethany_react_admin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA deep-link fallback handled inside the React nginx container,
        # but we still need the outer proxy to not 404 on sub-paths.
        proxy_intercept_errors off;
    }
}