# Deploy to the Hostinger VPS (hub.bethanyhouse.co.ke) on every push to main.
#
# Flow: build the three production images -> push to GHCR under this repo ->
# SSH into the VPS -> sync docker-compose.yml -> pull images -> run Laravel
# migrations -> recreate containers.
#
# Required repo secrets:
#   VPS_HOST     - VPS IP or hostname
#   VPS_SSH_KEY  - private key whose public half is in root's authorized_keys

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # Per-ref: main deploys serialize; each PR gets its own lane.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: testing
      DB_PASSWORD: testing
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_pgsql, pgsql, gd, zip, intl, bcmath
          coverage: none

      - name: Seed test environment
        working-directory: backend
        run: cp .env.example .env

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run tests
        working-directory: backend
        run: php artisan test

  build:
    name: Build ${{ matrix.service }}
    needs: test
    # Only build/deploy on pushes to main (and manual dispatch); PRs run tests only.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bethany-laravel
            context: ./backend
            build-args: ""
          - service: bethany-nextjs
            context: ./frontend
            build-args: |
              NEXT_PUBLIC_API_URL=/api
              NEXT_PUBLIC_APP_URL=https://hub.bethanyhouse.co.ke
          - service: bethany-react-admin
            context: ./react-admin
            build-args: |
              VITE_API_URL=https://hub.bethanyhouse.co.ke/api
              VITE_BASE_PATH=/admin/
              VITE_REVERB_APP_KEY=62102a9dad2a1f794d008d6e89ae2afd
              VITE_REVERB_HOST=hub.bethanyhouse.co.ke
              VITE_REVERB_PORT=443
              VITE_REVERB_SCHEME=https
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Host key. ssh-keyscan is a LIVE network call to the VPS with no
          # timeout or retry — under `bash -e` a single hiccup killed the whole
          # deploy (the builds had all passed). It is also trust-on-first-use
          # every run, so it accepts whatever key the host presents.
          #
          # Preferred: pin the key once via the VPS_KNOWN_HOSTS secret — no
          # network call, deterministic, and actually verifies the host.
          # Fallback: keyscan, but with a timeout and retries.
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
            echo "Using pinned host key from VPS_KNOWN_HOSTS."
          else
            for i in 1 2 3 4 5; do
              # keyscan can exit 0 having written nothing, so require content.
              ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
              if [ -s ~/.ssh/known_hosts ]; then
                echo "Host key acquired on attempt $i."
                break
              fi
              echo "ssh-keyscan attempt $i found no key; retrying in $((i * 5))s…"
              sleep $((i * 5))
            done
            if [ ! -s ~/.ssh/known_hosts ]; then
              echo "::error::Could not reach ${{ secrets.VPS_HOST }}:22 to read its host key after 5 attempts. The VPS may be down, or fail2ban/the firewall may be blocking GitHub runner IPs."
              exit 1
            fi
          fi
        # Don't let one bad network moment fail a deploy whose images all built.
        timeout-minutes: 3

      - name: Sync compose file
        run: |
          # Retry: a transient SSH blip shouldn't fail a green build.
          for i in 1 2 3; do
            scp -o ConnectTimeout=15 -o ServerAliveInterval=15 \
              -i ~/.ssh/deploy_key docker-compose.yml \
              "root@${{ secrets.VPS_HOST }}:/opt/bethany-house/docker-compose.yml" && exit 0
            echo "scp attempt $i failed; retrying in $((i * 5))s…"
            sleep $((i * 5))
          done
          echo "::error::Could not copy docker-compose.yml to the VPS after 3 attempts."
          exit 1

      - name: Pull images, migrate, restart
        run: |
          ssh -o ConnectTimeout=15 -o ServerAliveInterval=15 \
            -i ~/.ssh/deploy_key "root@${{ secrets.VPS_HOST }}" bash -s <<'DEPLOY'
          set -euo pipefail
          cd /opt/bethany-house

          # Pin the compose image namespace to this repo (survives .env drift).
          if grep -q '^GITHUB_REPOSITORY=' .env; then
            sed -i 's|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ github.repository }}|' .env
          else
            echo 'GITHUB_REPOSITORY=${{ github.repository }}' >> .env
          fi

          # Ephemeral login so private GHCR packages pull; logged out afterwards
          # so other stacks on this box keep pulling anonymously.
          echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

          docker compose pull laravel nextjs react-admin
          # -T + </dev/null: without them `compose run` eats the rest of this
          # heredoc as container stdin and the script dies here "successfully".
          docker compose run --rm --no-deps -T laravel php artisan migrate --force </dev/null
          docker compose up -d --remove-orphans

          docker logout ghcr.io
          docker image prune -f

          docker compose ps
          DEPLOY
