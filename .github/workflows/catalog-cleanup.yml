# Manually-triggered runner for the catalog:cleanup artisan command on the VPS.
#
# Dispatch with no input  -> read-only audit (writes nothing).
# Dispatch with `flags`    -> e.g. "--fix-names --apply" or "--archive=48,75 --apply".
#
# Reuses the same VPS secrets as the deploy workflow. Output appears in the job
# log. The command itself is preview-by-default, so a bare run is always safe.

name: Catalog cleanup

on:
  workflow_dispatch:
    inputs:
      flags:
        description: 'Flags for catalog:cleanup (empty = read-only audit). e.g. --fix-names --apply'
        required: false
        default: ''

concurrency:
  group: catalog-cleanup
  cancel-in-progress: false

jobs:
  run:
    name: Run catalog:cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            for i in 1 2 3 4 5; do
              ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
              [ -s ~/.ssh/known_hosts ] && break
              sleep $((i * 5))
            done
            [ -s ~/.ssh/known_hosts ] || { echo "::error::Could not read host key"; exit 1; }
          fi
        timeout-minutes: 3

      - name: Run catalog:cleanup on the VPS
        # Pass flags via env to keep them out of the shell-expansion path.
        env:
          FLAGS: ${{ github.event.inputs.flags }}
        run: |
          ssh -o ConnectTimeout=15 -o ServerAliveInterval=15 \
            -i ~/.ssh/deploy_key "root@${{ secrets.VPS_HOST }}" \
            "cd /opt/bethany-house && docker compose run --rm -T laravel php artisan catalog:cleanup ${FLAGS}"
