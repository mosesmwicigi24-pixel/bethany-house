server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    # Allow real image/document uploads. Default is 1 MB, which rejected product
    # image uploads with 413 before they ever reached PHP. Kept just under PHP's
    # post_max_size (21M) so PHP validation is the effective ceiling.
    client_max_body_size 20m;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── CORS ──────────────────────────────────────────────────────────────────
    # Applied to every response so preflight OPTIONS and actual requests
    # both carry the correct headers.
    set $cors_origin "";
    if ($http_origin ~* "^(https://(www\.)?bethanyhouse\.co\.ke|https://hub\.bethanyhouse\.co\.ke|http://(localhost|127\.0\.0\.1)(:[0-9]+)?)$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin      $cors_origin   always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;
    add_header Access-Control-Allow-Credentials "true"         always;
    add_header Access-Control-Max-Age           "86400"        always;

    # Handle OPTIONS preflight immediately - never reaches PHP
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Laravel routes ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   127.0.0.1:9000;   # PHP-FPM on localhost inside same container
        # nginx is the single CORS authority (headers added above) — hide
        # Laravel's copies or browsers reject the duplicated headers.
        fastcgi_hide_header Access-Control-Allow-Origin;
        fastcgi_hide_header Access-Control-Allow-Methods;
        fastcgi_hide_header Access-Control-Allow-Headers;
        fastcgi_hide_header Access-Control-Allow-Credentials;
        fastcgi_hide_header Access-Control-Max-Age;
        fastcgi_hide_header Vary;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        include        fastcgi_params;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}